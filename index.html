<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Venue ID Scanner & Age Display</title>
    <!-- Loaded the official CDN distribution engine for HTML5-QRCode -->
    <script src="https://unpkg.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121214;
            color: #e1e1e6;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 440px;
            margin: auto;
            background: #1c1c1f;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #fff;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5em;
            letter-spacing: 0.5px;
        }
        #reader {
            width: 100%;
            min-height: 250px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            border: 1px solid #29292e;
        }
        /* HIDE UGLY DEFAULT LIBRARY BUTTONS AND ACCIDENTS */
        #reader__dashboard_section_swaplink, 
        #reader__dashboard_section_fsr,
        #reader button {
            display: none !important;
        }
        /* Tap Action Button for iOS Safari Permission */
        .action-btn {
            width: 100%;
            padding: 16px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            margin-bottom: 15px;
            text-align: center;
        }
        .status-alert-box {
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
            display: none;
            font-weight: bold;
        }
        .alert-valid {
            background: rgba(40, 167, 69, 0.15);
            border: 2px solid #28a745;
            color: #28a745;
        }
        .alert-expired {
            background: rgba(220, 53, 69, 0.15);
            border: 2px solid #dc3545;
            color: #dc3545;
        }
        .age-display-box {
            background: #202024;
            border: 2px solid #007bff;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
            display: none;
        }
        .age-title {
            font-size: 0.9em;
            color: #a8a8b3;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .age-number {
            font-size: 2.8em;
            font-weight: 800;
            color: #007bff;
            line-height: 1;
        }
        .data-box {
            background: #29292e;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #323238;
            padding: 10px 0;
            font-size: 0.95em;
        }
        .data-row:last-child {
            border-bottom: none;
        }
        .data-label {
            color: #a8a8b3;
            font-weight: 500;
        }
        .data-value {
            color: #fff;
            text-align: right;
            font-weight: 600;
            padding-left: 10px;
        }
        .status-sync {
            text-align: center;
            font-size: 0.85em;
            color: #7c7c8a;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>ID Scanner & Age Log</h2>
    
    <!-- Manual Action Trigger required to bypass iOS Webkit restrictions -->
    <button id="start-btn" class="action-btn">📷 Start ID Scanner</button>
    
    <div id="reader"></div>

    <div id="status-alert" class="status-alert-box"></div>

    <div id="age-box" class="age-display-box">
        <div class="age-title">Calculated Age</div>
        <div id="res-age" class="age-number">-</div>
    </div>

    <div class="data-box">
        <div class="data-row"><span class="data-label">First Name:</span><span id="res-first" class="data-value">-</span></div>
        <div class="data-row"><span class="data-label">Last Name:</span><span id="res-last" class="data-value">-</span></div>
        <div class="data-row"><span class="data-label">DOB:</span><span id="res-dob" class="data-value">-</span></div>
        <div class="data-row"><span class="data-label">Expiration Date:</span><span id="res-exp" class="data-value">-</span></div>
        <div class="data-row"><span class="data-label">Address:</span><span id="res-address" class="data-value">-</span></div>
    </div>
    <div id="sync-status" class="status-sync">Tap the button above to launch camera...</div>
</div>

<script>
    // Paste your Google Apps Script URL here once deployed
    const GOOGLE_WEB_APP_URL = "YOUR_DEPLOYED_WEB_APP_URL_HERE";
    
    let html5QrCode;

    document.getElementById("start-btn").addEventListener("click", function() {
        this.style.display = "none"; // Hide button after interaction
        document.getElementById("sync-status").innerText = "Initializing camera pipelines...";
        
        // Target structural object declaration
        html5QrCode = new Html5Qrcode("reader");
        
        html5QrCode.start(
            { facingMode: "environment" }, // Target the rear lens
            {
                fps: 15,
                // FIX FOR SAFARI: Fixed dimensions ensure scanning canvas cannot exceed parent boundary width
                qrbox: { width: 280, height: 160 },
                formatsToSupport: [ Html5QrcodeSupportedFormats.PDF_417 ]
            },
            onScanSuccess
        )
        .then(() => {
            document.getElementById("sync-status").innerText = "Align barcode within the center window.";
        })
        .catch(err => {
            console.error("Camera startup fault: ", err);
            document.getElementById("start-btn").style.display = "block";
            document.getElementById("sync-status").innerText = "Error: Check Safari app permissions under iOS Settings.";
        });
    });

    function onScanSuccess(decodedText) {
        document.getElementById("sync-status").innerText = "Processing barcode data payload...";

        const first = extractField(decodedText, "DAC");
        const middle = extractField(decodedText, "DAD");
        const last = extractField(decodedText, "DCS");
        const dobRaw = extractField(decodedText, "DBB"); 
        const expRaw = extractField(decodedText, "DBA");
        const street = extractField(decodedText, "DAG");
        const city = extractField(decodedText, "DAI");
        const state = extractField(decodedText, "DAJ");
        const zip = extractField(decodedText, "DAK");
        
        const fullAddress = `${street}, ${city}, ${state} ${zip}`.replace(/^[,\s]+|[,\s]+$/g, '').trim();

        if (!dobRaw || dobRaw.length < 8) {
            document.getElementById("sync-status").innerText = "Error: Invalid data structure or birth segment missing.";
            return;
        }

        const dobParsed = parseAamvaDate(dobRaw);
        const formattedDOB = `${String(dobParsed.month).padStart(2,'0')}/${String(dobParsed.day).padStart(2,'0')}/${dobParsed.year}`;
        const calculatedAge = getCalculatedAge(dobParsed.year, dobParsed.month, dobParsed.day);

        let formattedEXP = "N/A";
        let isExpired = false;
        
        if (expRaw && expRaw.length >= 8) {
            const expParsed = parseAamvaDate(expRaw);
            formattedEXP = `${String(expParsed.month).padStart(2,'0')}/${String(expParsed.day).padStart(2,'0')}/${expParsed.year}`;
            
            const today = new Date();
            today.setHours(0,0,0,0);
            const expDate = new Date(expParsed.year, expParsed.month - 1, expParsed.day);
            
            if (expDate < today) {
                isExpired = true;
            }
        }

        // Interface adjustments
        document.getElementById("res-first").innerText = first || "N/A";
        document.getElementById("res-last").innerText = last || "N/A";
        document.getElementById("res-dob").innerText = formattedDOB;
        document.getElementById("res-exp").innerText = formattedEXP;
        document.getElementById("res-address").innerText = fullAddress || "N/A";
        document.getElementById("res-age").innerText = calculatedAge;
        document.getElementById("age-box").style.display = "block";

        const alertBox = document.getElementById("status-alert");
        alertBox.style.display = "block";
        if (isExpired) {
            alertBox.className = "status-alert-box alert-expired";
            alertBox.innerText = "🚨 WARNING: THIS ID IS EXPIRED";
        } else {
            alertBox.className = "status-alert-box alert-valid";
            alertBox.innerText = "✓ VALID ENTRY PRIVILEGES";
        }

        // Freeze engine tracking during asynchronous operations
        html5QrCode.stop().catch(err => console.error("Pause fault:", err));

        const payload = {
            firstName: first || "N/A",
            middleName: middle || "",
            lastName: last || "N/A",
            dob: formattedDOB,
            expirationDate: formattedEXP,
            status: isExpired ? "EXPIRED" : "VALID",
            age: calculatedAge,
            address: fullAddress || "N/A"
        };

        if(GOOGLE_WEB_APP_URL === "YOUR_DEPLOYED_WEB_APP_URL_HERE") {
            document.getElementById("sync-status").innerText = "Validation complete (Cloud link missing).";
            resetScannerAfterDelay();
            return;
        }

        fetch(GOOGLE_WEB_APP_URL, {
            method: "POST",
            mode: "no-cors", 
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            document.getElementById("sync-status").innerText = "Data synchronized seamlessly to central log.";
            resetScannerAfterDelay();
        })
        .catch(err => {
            console.error("Transmission fault: ", err);
            document.getElementById("sync-status").innerText = "Local validation completed; network sync error.";
            resetScannerAfterDelay();
        });
    }

    function resetScannerAfterDelay() {
        setTimeout(() => {
            document.getElementById("status-alert").style.display = "none";
            document.getElementById("age-box").style.display = "none";
            document.getElementById("sync-status").innerText = "Rebooting video framework...";
            
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 280, height: 160 }, formatsToSupport: [ Html5QrcodeSupportedFormats.PDF_417 ] },
                onScanSuccess
            ).then(() => {
                document.getElementById("sync-status").innerText = "Ready to scan next ID...";
            });
        }, 4000); 
    }

    function extractField(data, key) {
        const regex = new RegExp(key + "([^\\n\\r\\f\\v\\x1E\\x1D]+)");
        const match = data.match(regex);
        return match ? match[1].trim() : "";
    }

    function parseAamvaDate(rawDateStr) {
        let month, day, year;
        if (/^\d{4}/.test(rawDateStr)) {
            year = parseInt(rawDateStr.substring(0, 4), 10);
            month = parseInt(rawDateStr.substring(4, 6), 10);
            day = parseInt(rawDateStr.substring(6, 8), 10);
        } else { 
            month = parseInt(rawDateStr.substring(0, 2), 10);
            day = parseInt(rawDateStr.substring(2, 4), 10);
            year = parseInt(rawDateStr.substring(4, 8), 10);
        }
        return { month, day, year };
    }

    function getCalculatedAge(birthYear, birthMonth, birthDay) {
        const today = new Date();
        let age = today.getFullYear() - birthYear;
        const monthDiff = (today.getMonth() + 1) - birthMonth;
        const dayDiff = today.getDate() - birthDay;
        if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) { age--; }
        return age;
    }
</script>
</body>
</html>
